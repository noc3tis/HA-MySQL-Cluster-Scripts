# ==========================================
# Archivo de Configuración de Prometheus
# Ruta en el servidor: /etc/prometheus/prometheus.yml
# ==========================================
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mysql_cluster_equipoK'
    static_configs:
      # Nodos: instancia1ulloa, instancia2ulloa (Primario), vnic3
      - targets: ['10.0.1.219:9104', '10.0.1.72:9104', '10.0.1.196:9104']
